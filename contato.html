<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>
    <link rel="stylesheet" type="text/css" href="css/style.css">
    <link rel="shortcut icon" href="imagens/icone.PNG">
    <script src="https://kit.fontawesome.com/382a5585e6.js" crossorigin="anonymous"></script>
</head>
<body>
    <header>
        <div class="topo">
            <div class="container">
                <div class="flex">
                    <div class="flex-col1">
                        <a href="index.html" title="Home" class="header-logo">
                            <img src="imagens/Logo do jogo.png" alt="Fortuna Roubada" class="img1">
                        </a>
                    </div>
                    <div class="flex-col2">
                    <a href="javascript:mostrarmenu()" class="header-menu">
                        <i class="fas fa-bars"></i>
                    </a>
                    <nav class="header-nav">
                        <ul>
                            <li><a href="index.html" title="Home">Home</a></li>
                            <li><a href="sobre.html" title="Sobre">Sobre</a></li>
                            <li><a href="ux.html" title="UX">UX</a></li>
                            <li><a href="galeria.html" title="Galeria de Fotos">Galeria</a></li>
                            <li><a href="contato.html" title="Contato">Contato</a></li>
                            <li><a href="jogar.html" title="Jogar" class="header-btn">Jogar</a></li>
                        </ul>
                    </nav>
                    </div>
                </div>
            </div>
        </div>
    </header>  
    <main>
        <section class="sobre">
            <div class="container">
                <h1>
                    <span class="faixa"><i class="fas fa-envelope"></i> Entre em Contato</span>
                </h1>
                <form id="formContato" autocomplete="off">
                    <label for="nome">Digite seu nome:</label>
                    <input type="text" name="nome" id="nome" required>
                    <label for="email">Digite seu e-mail:</label>
                    <input type="email" name="email" id="email" required>
                    <label for="mensagem">Mensagem:</label>
                    <textarea name="mensagem" id="mensagem" rows="8" required></textarea>
                    <button type="submit">
                        <i class="fas fa-check"></i>
                            Enviar Mensagem
                    </button>
                </form>
                <div id="resultado"></div>
            </div>
        </section>
    </main>
    <footer class="footer">
        <div class="container center">
            <p>
                <img src="imagens/Logo do jogo.png" alt="Fortuna roubada" class="img3">
            </p>
            <p class="redes">
                <a href="#" title="Facebook">
                    <i class="fab fa-facebook"></i>
                </a>
                <a href="#" title="Instagram">
                    <i class="fab fa-instagram"></i>
                </a>
            </p>
            <p>Desenvolvido por Claudio Cezar Coelho Junior </p>
        </div>
    </footer>
    <script>
    function mostrarmenu(){
            document.querySelector("header nav").classList.toggle("mostrar");                
        }

    const form = document.getElementById("formContato");
    const resultado = document.getElementById("resultado");

    form.addEventListener("submit", function (e) {
        e.preventDefault();

        const nome = document.getElementById("nome").value.trim();
        const email = document.getElementById("email").value.trim();
        const mensagem = document.getElementById("mensagem").value.trim();

        if (nome === "" || email === "" || mensagem === "") {
            alert("Por favor, preencha todos os campos.");
            return;
        }

        resultado.style.display = "block";
        resultado.innerHTML = `
            <h2>Dados enviados com sucesso</h2>
            <p><strong>Nome:</strong> ${nome}</p>
            <p><strong>E-mail:</strong> ${email}</p>
            <p><strong>Mensagem:</strong> ${mensagem}</p>
        `;

        form.reset();
    });
</script>
</body>
</html>
