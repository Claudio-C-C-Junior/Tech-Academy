<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria</title>
    <link rel="stylesheet" type="text/css" href="css/style.css">
    <link rel="shortcut icon" href="imagens/icone.PNG">
    <script src="https://kit.fontawesome.com/382a5585e6.js" crossorigin="anonymous"></script>
</head>
<body>
    <header>
        <div class="topo">
            <div class="container">
                <div class="flex">
                    <div class="flex-col1">
                        <a href="index.html" title="Home" class="header-logo">
                            <img src="imagens/Logo do jogo.png" alt="Fortuna Roubada" class="img1">
                        </a>
                    </div>
                    <div class="flex-col2">
                    <a href="javascript:mostrarmenu()" class="header-menu">
                        <i class="fas fa-bars"></i>
                    </a>
                    <nav class="header-nav">
                        <ul>
                            <li><a href="index.html" title="Home">Home</a></li>
                            <li><a href="sobre.html" title="Sobre">Sobre</a></li>
                            <li><a href="ux.html" title="UX">UX</a></li>
                            <li><a href="galeria.html" title="Galeria de Fotos">Galeria</a></li>
                            <li><a href="contato.html" title="Contato">Contato</a></li>
                            <li><a href="jogar.html" title="Jogar" class="header-btn">Jogar</a></li>
                        </ul>
                    </nav>
                    </div>
                </div>
            </div>
        </div>
    </header> 
    <main>
        <section class="sobre">
            <div class="container">
                <h1>
                    <span class="faixa"><i class="fas fa-camera"></i> Galeria de Fotos</span>
                </h1>

                <div class="grid">
                    <div class="col">
                        <img src="imagens/banner.png" alt="Foto 1" title="Foto 1">
                    </div>
                    <div class="col">
                        <img src="imagens/1.png" alt="Foto 2" title="Foto 2">
                    </div>

                    <div class="col">
                        <img src="imagens/2.png" alt="Foto 3" title="Foto 3">
                    </div>
                    <div class="col">
                        <img src="imagens/3.png" alt="Foto 4" title="Foto 4">
                    </div>

                    <div class="col">
                        <img src="imagens/4.png" alt="Foto 5" title="Foto 5">
                    </div>
                </div>

            </div>
        </section>
    </main>
    <footer class="footer">
        <div class="container center">
            <p>
                <img src="imagens/Logo do jogo.png" alt="Fortuna roubada" class="img3">
            </p>
            <p class="redes">
                <a href="#" title="Facebook">
                    <i class="fab fa-facebook"></i>
                </a>
                <a href="#" title="Instagram">
                    <i class="fab fa-instagram"></i>
                </a>
            </p>
            <p>Desenvolvido por Claudio Cezar Coelho Junior </p>
        </div>
    </footer>
    <script>
        function mostrarmenu(){
            document.querySelector("header nav").classList.toggle("mostrar");                
        }
    </script>
</body>
</html>
